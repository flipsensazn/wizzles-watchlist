name: Weekly Small-Cap Scanner ETL

on:
  schedule:
    # Runs at 10:00 UTC (6:00 AM EDT) every Sunday — ready for Monday open
    - cron: '0 10 * * 0'
  
  # Lets you manually trigger a run from the GitHub UI for testing
  workflow_dispatch:

jobs:
  run-etl-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy psycopg2-binary

      - name: Run ETL Pipeline
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
       run: |
          find . -name "etl_pipeline.py"
          python $(find . -name "etl_pipeline.py" | head -1)
