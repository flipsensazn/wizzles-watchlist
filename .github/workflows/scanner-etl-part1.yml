name: Weekly ETL — Part 1 (A–M)

on:
  schedule:
    # Sunday 2:00 AM EDT (6:00 UTC) — processes symbols A through M
    - cron: '0 6 * * 0'

  # Manual trigger for testing
  workflow_dispatch:

jobs:
  run-etl-part1:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5 hour hard cap — well under GitHub's 6h limit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install requests pandas numpy psycopg2-binary

      - name: Run ETL Pipeline — Part 1 (A–M)
        env:
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          SYMBOL_RANGE_START:   "A"
          SYMBOL_RANGE_END:     "N"
        run: python src/etl_pipeline.py
