name: Weekly XBRL Gauges ETL

on:
  schedule:
    # Sunday ~11:17 UTC — after the small-cap scanner, off the :00 mark
    - cron: '17 11 * * 0'

  # Manual trigger for testing / backfills
  workflow_dispatch:
    inputs:
      ticker_limit:
        description: 'Limit run to first N tickers (testing)'
        required: false
        default: ''

jobs:
  run-xbrl-gauges:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # ~150 SEC companyfacts calls at a polite pace

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install requests psycopg2-binary

      - name: Run XBRL Gauges ETL
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          WATCHLIST_BASE_URL: ${{ vars.WATCHLIST_BASE_URL }}
          TICKER_LIMIT:       ${{ github.event.inputs.ticker_limit }}
        run: python src/xbrl_gauges.py

      # Blend the freshly-written gauges with the week's transcript stress and
      # filed concentration into the Composite Bottleneck Score snapshot, and
      # send the weekly CBS movers digest to Telegram.
      - name: Compute Composite Bottleneck Scores
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/composite_score.py

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d '{"text":"⚠️ Wizzles Watchlist XBRL gauges ETL failed — check the GitHub Actions log for details."}'
          fi
