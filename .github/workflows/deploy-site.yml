name: Deploy Site (Workers)

# Replaces the Cloudflare Pages Git integration: every merge to main builds
# the frontend and deploys the site Worker (workers/site) — API functions,
# static assets, KV binding, all in one deployable.
#
# Requires one repo secret: CLOUDFLARE_API_TOKEN (Workers Scripts:Edit).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npx vite build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers/site
          # Sync the Worker's runtime secrets from the repo secrets the ETL
          # workflows already use — rotate once in GitHub, next deploy syncs.
          # (env FINNHUB_KEY maps from the repo's FINNHUB_API_KEY name.)
          secrets: |
            ADMIN_PASSWORD
            DATABASE_URL
            GEMINI_API_KEY
            FINNHUB_KEY
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_API_KEY }}
