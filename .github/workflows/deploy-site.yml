name: Deploy Site (Workers)

# Replaces the Cloudflare Pages Git integration: every merge to main builds
# the frontend and deploys the site Worker (workers/site) — API functions,
# static assets, KV binding, all in one deployable.
#
# Requires one repo secret: CLOUDFLARE_API_TOKEN (Workers Scripts:Edit).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22  # wrangler 4.x requires Node >= 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npx vite build

      # Plain wrangler instead of cloudflare/wrangler-action: the action's
      # bundled-wrangler bootstrap breaks under current runner npm (npx
      # refuses its install) and its secrets uploader can't read
      # wrangler.jsonc. Two explicit steps are simpler and debuggable.
      - name: Deploy Worker
        working-directory: workers/site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4.113.0 deploy

      # Sync the Worker's runtime secrets from the repo secrets the ETL
      # workflows already use — rotate once in GitHub, next deploy syncs.
      # (env FINNHUB_KEY maps from the repo's FINNHUB_API_KEY name.)
      - name: Sync Worker Secrets
        working-directory: workers/site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          jq -n \
            --arg a "$ADMIN_PASSWORD" \
            --arg d "$DATABASE_URL" \
            --arg g "$GEMINI_API_KEY" \
            --arg f "$FINNHUB_KEY" \
            '{ADMIN_PASSWORD: $a, DATABASE_URL: $d, GEMINI_API_KEY: $g, FINNHUB_KEY: $f}' > .secrets.json
          npx --yes wrangler@4.113.0 secret bulk .secrets.json --name capex-iq
          rm .secrets.json
